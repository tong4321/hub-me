name: Verify IPTV Servers

on:
  schedule:
    - cron: '0 */20 * * *'  # Every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '_tools/verify_servers.py'

permissions:
  contents: write

concurrency:
  group: verify-servers-main
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run server verification
        env:
          SERVERS_URL: https://raw.githubusercontent.com/tong4321/hub-me/refs/heads/main/_tools/servers.json
          OUTPUT_FILE: servers.json
          TIMEOUT: 8              # ลดจาก 10 เป็น 8 วินาที
          PROBE_TIMEOUT: 1        # ลดจาก 2 เป็น 1 วินาที
          MAX_WORKERS: 20         # เพิ่มจาก 15 เป็น 20 (parallel request)
          MAX_SERVER_WORKERS: 10  # เพิ่มจาก 8 เป็น 10 (verify more servers in parallel)
          DEFAULT_POOL_SIZE: 50   # เก็บไว้เหมือนเดิม
        run: python _tools/verify_servers.py

      - name: Run server verification with timeout
        run: |
          timeout 6000 python _tools/verify_servers.py || echo "Script timeout or failed"

      - name: Check for changes
        id: changes
        run: |
          if git diff --name-only | grep -q "servers.json"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add servers.json
          git commit -m "Update servers.json - verified IPTV servers"
          git pull --rebase origin main
          git push origin main

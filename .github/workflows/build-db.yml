name: Build IPTV Database
on:
  schedule:
    - cron: '0 22 * * *' # Rules are available at 5 AM UTC+7.
  workflow_dispatch: # Permite declansarea manuala din GitHub UI

permissions:
  contents: write

concurrency:
  group: build-db-main
  cancel-in-progress: false

jobs:
  build-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper & Build Database
        run: python _tools/build_db.py

      - name: Show database file sizes
        run: |
          echo "Database file sizes:"
          ls -lh iptv_*.db || echo "No database files found"
          du -h iptv_*.db 2>/dev/null || true

      - name: Commit and Push Databases
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add iptv_live.db iptv_movies.db iptv_series.db
          git commit -m "Auto-update IPTV Databases (live, movies, series) [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin main

      - name: Upload databases as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iptv-databases
          path: |
            iptv_live.db
            iptv_movies.db
            iptv_series.db
          retention-days: 7
